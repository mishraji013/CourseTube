<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Course Player
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            CourseTube
        </div>

        <button
            class="logout-btn"
            onclick="logout()"
        >
            Logout
        </button>

    </nav>


    <!-- PLAYER LAYOUT -->

    <div class="player-layout">

        <!-- LEFT SIDE -->

        <div class="player-main">

            <h1
                id="courseTitle"
                class="course-heading"
            >
                Loading...
            </h1>


            <!-- VIDEO -->

            <div class="video-wrapper">

                <div
                    id="videoFrame"
                    style="
                    width:100%;
                    height:500px;
                    border-radius:20px;
                    overflow:hidden;
                    background:black;
                    "
                >
                </div>

            </div>


            <!-- PROGRESS -->

            <div class="progress-card">

                <div class="progress-top">

                    <span>
                        Course Progress
                    </span>

                    <span
                        id="progressText"
                    >
                        0%
                    </span>

                </div>

                <div class="progress-bar">

                    <div
                        id="progressFill"
                        class="progress-fill"
                    ></div>

                </div>

            </div>


            <!-- COMPLETE BUTTON -->

            <button
                class="complete-btn"
                onclick="completeLecture()"
            >
                ✅ Mark as Completed
            </button>


            <!-- QUIZ BUTTON -->

            <button
                id="quizBtn"
                class="quiz-btn"
                style="display:none"
                onclick="
                window.location.href=
                'quiz.html'
                "
            >
                🎯 Take Final Quiz
            </button>

        </div>



        <!-- RIGHT SIDE -->

        <div class="lecture-sidebar">

            <h2>
                Course Lectures
            </h2>

            <div
                id="lectureList"
            >
            </div>

        </div>

    </div>


    <!-- YOUTUBE PLAYER API -->

    <script
        src=
        "https://www.youtube.com/iframe_api"
    >
    </script>

    <script src="script.js"></script>

</body>

</html>
